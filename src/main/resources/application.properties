# Server
server.port=8080

app.frontend.url=http://51.21.239.64

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/concertdb
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.task.scheduling.enabled=false

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# JPA Batch — performance
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
#spring.jpa.hibernate.ddl-auto=validate
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

#spring.datasource.url=jdbc:p6spy:postgresql://localhost:5432/concertdb
#spring.datasource.driver-class-name=com.p6spy.engine.spy.P6SpyDriver
spring.jpa.properties.hibernate.generate_statistics=false
#logging.level.org.hibernate.stat=DEBUG
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASS}

# Redis Pool
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2


# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASS}
# RabbitMQ manual ack
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=900000
# JWT Refresh Token
app.jwt.refresh-expiration=604800000

# Brevo
brevo.api.key=${BREVO_API_KEY}
brevo.from.email=${BREVO_EMAIL}
brevo.from.name=EventMax
app.otp.expiry-minutes=10
app.otp.max-attempts=5
app.otp.length=6

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_SECRET}
razorpay.currency=INR
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.writer-with-default-pretty-printer=true
springdoc.swagger-ui.configuration.ui-flavor=scalar

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://51.21.239.64:8080/login/oauth2/code/google

#Health checks for docker
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Booking Business Rules
app.booking.platform-fee-percentage=5.0
app.booking.gateway-fee-percentage=2.0
app.booking.default-lock-ttl-minutes=5
app.booking.waitlist-window-minutes=15

# WebSocket
app.websocket.allowed-origins=http://51.21.239.64

# Logging
logging.level.com.concertbooking=DEBUG
logging.level.org.springframework.security=INFO

spring.docker.compose.enabled=false
testcontainers.reuse.enable=true
spring.data.web.pageable.one-indexed-parameters=false
springdoc.default-flat-param-object=true

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

spring.mvc.format.date-time=iso
spring.jackson.mapper.default-view-inclusion=true
spring.config.import=optional:file:secrets.env[.properties]
app.booking.pending-expiry-minutes=6
spring.threads.virtual.enabled=true