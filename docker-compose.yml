

services:
  backend:
    build: .
    restart: unless-stopped
    container_name: concert_backend
    env_file:
      - secrets.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
    ports:
      - "8080:8080"
  frontend:
    build: ./frontend
    restart: unless-stopped
    container_name: convenespace_frontend
    depends_on:
      - backend
    ports:
      - "3001:80"
  postgres:
    env_file:
      - secrets.env
    restart: unless-stopped
    image: postgres:16
    container_name: concert_postgres
    environment:
      POSTGRES_DB: concertdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    env_file:
      - secrets.env
    restart: unless-stopped
    image: redis:7.2-alpine
    container_name: concert_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASS}

  prometheus:
    env_file:
      - secrets.env
    restart: unless-stopped
    image: prom/prometheus
    container_name: concert_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
   

  grafana:
    env_file:
      - secrets.env
    restart: unless-stopped
    image: grafana/grafana
    container_name: concert_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  rabbitmq:
    env_file:
      - secrets.env
    restart: unless-stopped
    image: rabbitmq:3.13-management
    container_name: concert_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_ENABLED_PLUGINS_FILE: /etc/rabbitmq/enabled_plugins
    volumes:
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"

volumes:
  postgres_data:
  grafana_data:

